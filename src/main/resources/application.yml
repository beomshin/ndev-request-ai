# 서버 설정 (다른 프로젝트와 충돌 방지로 8090. SERVER_PORT 환경변수로 덮어쓰기 가능)
server:
  port: ${SERVER_PORT:8090}

spring:
  application:
    name: nice-qa

  # 요청서 영속화 — H2 파일 모드. 데이터 파일은 ./data/req-genie 에 생성됨 (.gitignore 권장).
  # 사내 DB(MariaDB/MySQL/Postgres) 전환 시 url/driver/dialect만 갈아끼우면 됨.
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/req-genie;MODE=MYSQL;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}    # 파일럿: update / 운영: validate + Flyway 권장
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: ${H2_CONSOLE:true}
      path: /h2-console

# LLM 어댑터 스위치 + 사내 LLM 접속 정보 (Phase 0은 stub 고정, 실값은 placeholder)
llm:
  provider: ${LLM_PROVIDER:stub}        # stub | internal | external
  base-url: ${LLM_BASE_URL:}
  model: ${LLM_MODEL:}
  api-key: ${LLM_API_KEY:}

# 지식저장소(KB) 어댑터 스위치 + 접속 정보
knowledge:
  provider: ${KB_PROVIDER:stub}         # stub | internal
  base-url: ${KB_BASE_URL:}

# 외부 시스템(SHARE/Plane/Confluence) 자동 연계 — Phase 0은 noop 고정
external-sync:
  provider: ${EXT_SYNC_PROVIDER:noop}   # noop | share

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  temperature: 0.2
  max-output-tokens: 8192

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha